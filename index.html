<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>forspreea - Animal Type Test</title>
  <link href='/style.css' rel='stylesheet'>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>forspreea</h1>
      <button id="theme-toggle">Switch to Dark Mode</button>
    </header>

    <section class="test-section">
      <h2>동물상 테스트</h2>
      <p class="description">카메라를 켜고 당신이 강아지상인지 고양이상인지 확인해보세요!</p>
      <button type="button" class="start-btn" onclick="initTest()">테스트 시작하기</button>
      <div id="webcam-container"></div>
      <div id="label-container"></div>
    </section>

    <section class="inquiry-section">
      <h2>제휴 문의</h2>
      <form id="partnership-form" action="https://formspree.io/f/mzdqkodq" method="POST">
        <div class="form-group">
          <label for="company">업체명 / 성함</label>
          <input type="text" id="company" name="company" required placeholder="업체명 또는 성함을 입력하세요">
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="5" required placeholder="제휴 관련 내용을 상세히 적어주세요"></textarea>
        </div>
        <button type="submit" class="submit-btn">문의하기</button>
      </form>
    </section>

    <section class="comments-section">
      <div id="disqus_thread"></div>
      <script>
          (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://of-queen.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
    </section>
  </div>
  <script id="dsq-count-scr" src="//of-queen.disqus.com/count.js" async></script>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
