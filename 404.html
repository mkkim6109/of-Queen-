<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>페이지를 찾을 수 없습니다 (404) | AI 동물상 테스트 포스프리아(forspreea)</title>
  
  <!-- Canonical URL Redirect Script -->
  <script>
    if (window.location.hostname !== 'of-queen.pages.dev' && !window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) {
      window.location.replace('https://of-queen.pages.dev' + window.location.pathname + window.location.search + window.location.hash);
    }
  </script>

  <link href='/style.css' rel='stylesheet'>
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="/favicon.ico">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">forspreea</a>
    </div>
  </nav>

  <div class="container card" style="margin-top: 60px; text-align: center; max-width: 600px; padding: 50px 30px;">
    <div style="font-size: 5rem; font-weight: 800; color: var(--button-bg); line-height: 1; margin-bottom: 20px;">404</div>
    <h1 style="font-size: 1.8rem; margin-bottom: 15px;">요청하신 페이지를 찾을 수 없습니다</h1>
    <p style="font-size: 1.05rem; opacity: 0.8; margin-bottom: 30px; line-height: 1.6;">
      찾으시려는 페이지의 주소가 잘못 입력되었거나,<br>
      페이지 주소의 변경 또는 삭제로 인해 현재 사용하실 수 없습니다.
    </p>
    
    <div style="display: flex; flex-direction: column; gap: 12px; max-width: 300px; margin: 0 auto;">
      <a href="/" class="submit-btn" style="text-decoration: none; display: block; text-align: center; line-height: 1.2;">메인 홈으로 이동</a>
      <a href="/privacy.html" style="color: var(--text-color); opacity: 0.8; text-decoration: underline; font-size: 0.9rem;">개인정보처리방침 확인</a>
    </div>
  </div>

  <footer class="footer" style="margin-top: 100px;">
    <div class="footer-container">
      <p>&copy; 2026 forspreea. All rights reserved.</p>
    </div>
  </footer>

  <script>
    // Initialize light/dark theme matching main localStorage setting
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      document.body.setAttribute('data-theme', 'dark');
    }
  </script>
</body>
</html>
